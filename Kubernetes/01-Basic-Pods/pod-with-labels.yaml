---
# Pod 1
apiVersion: v1
kind: Pod
metadata:
  name: pod1
  namespace: dev
  labels:
    env: dev
    app: web
    tier: frontend
spec:
  containers:
  - name: nginx
    image: nginx:latest
    ports:
    - containerPort: 80

---
